services:
    postgres:
        image: postgres:15-alpine
        container_name: real_bank_postgres
        environment:
            POSTGRES_DB: javaisland_backend
            POSTGRES_USER: bank_admin
            POSTGRES_PASSWORD: bank_password
        ports:
            - "5432:5432"
        volumes:
            - javaisland-bank-postgres-data:/var/lib/postgresql/data

    keycloak:
        image: quay.io/keycloak/keycloak:24.0
        container_name: real_bank_keycloak
        command: start-dev --import-realm
        environment:
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin
            KC_HTTP_RELATIVE_PATH: /
            KC_HTTP_SECURITY_HEADERS: "false"
        ports:
            - "8080:8080"
        depends_on:
            - postgres
        volumes:
            - ./keycloak-realm-export.json:/opt/keycloak/data/import/realm-export.json

volumes:
    javaisland-bank-postgres-data:

server:
  port: 8081

spring:
  application:
    name: bank-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/javaisland_backend
    username: bank_admin
    password: bank_password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/real-bank-realm
          jwk-set-uri: http://localhost:8080/realms/real-bank-realm/protocol/openid-connect/certs
server:
  port: 8081

spring:
  application:
    name: bank-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/javaisland_backend
    username: bank_admin
    password: bank_password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/javaisland-realm
          jwk-set-uri: http://localhost:8080/realms/javaisland-realm/protocol/openid-connect/certs

springdoc:
  api-docs:
    path: /api/v3/api-docs
  swagger-ui:
    path: /api/swagger-ui.html
  override-with-generic-response: false
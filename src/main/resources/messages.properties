# ===== ACCOUNT =====
ACCOUNT_NOT_FOUND=Account non trovato.
ACCOUNT_CREATION_FAILED=Registrazione fallita: impossibile creare il conto. Riprova.
ACCOUNT_NOT_OWNED=Il conto non appartiene a questo utente.
INVALID_ACCOUNT_STATE=Stato del conto non valido per questa operazione.
REGISTRATION_ACCOUNT=Questo conto appartiene a una registrazione in corso. Usa l'attivazione della registrazione.
NON_ZERO_BALANCE=Il conto deve avere fondi zero prima di richiedere la chiusura.
PENDING_TRANSFER=Impossibile chiudere un conto con un bonifico in attesa verso un altro conto.
MAX_ACCOUNTS_REACHED=Hai raggiunto il numero massimo di conti.
PENDING_ACCOUNT_EXISTS=Hai già un conto in attesa di approvazione.
IBAN_GENERATION_FAILED=Errore tecnico nella generazione del numero di conto, riprova.
INVALID_AMOUNT=L'importo deve essere maggiore di 0.
INSUFFICIENT_FUNDS=Fondi insufficienti su questo conto.
LIMIT_EXCEEDED=L'importo del bonifico supera il limite consentito.

# ===== USER / AUTH =====
USER_NOT_FOUND=Utente non trovato.
USER_ALREADY_ACTIVE=Utente già attivato. Usa l'endpoint di attivazione del conto per conti secondari.
EMAIL_ALREADY_REGISTERED=Email già registrata.
USERNAME_ALREADY_REGISTERED=Nome utente già registrato.
EMAIL_EXISTS=Email già registrata.
ROLE_NOT_FOUND=Ruolo non configurato.
NOT_EMPLOYEE=L'utente non è un dipendente.
INVALID_STATE=La registrazione non è in stato PENDING.

# ===== KEYCLOAK =====
KEYCLOAK_ADMIN_AUTH_FAILED=Impossibile autenticarsi come amministratore Keycloak.
KEYCLOAK_CREATION_FAILED=Creazione utente Keycloak fallita.
KEYCLOAK_USER_CREATION_FAILED=Creazione utente Keycloak fallita.
KEYCLOAK_USER_EXISTS=Utente già registrato su Keycloak con questa email.
KEYCLOAK_PASSWORD_RESET_FAILED=Reimpostazione password Keycloak fallita.
ROLE_ASSIGNMENT_FAILED=Assegnazione ruolo dipendente fallita.

# ===== PIN =====
INVALID_PIN_FORMAT=Il PIN deve essere di 4 cifre.
PIN_ALREADY_EXISTS=PIN già configurato. Usa l'endpoint di aggiornamento.
INVALID_PIN=PIN non valido.

# ===== BENEFICIARY =====
INVALID_NICKNAME=Il nickname è obbligatorio.
SELF_BENEFICIARY_FORBIDDEN=Non puoi aggiungere uno dei tuoi conti come beneficiario.
DUPLICATE_BENEFICIARY=Il beneficiario esiste già.
BENEFICIARY_NOT_FOUND=Beneficiario non trovato.

# ===== CARD =====
CARD_NOT_FOUND=Carta non trovata.
CARD_FORBIDDEN=La carta non appartiene all'utente.
CARD_BLOCKED_PERMANENT=Impossibile modificare lo stato: la carta è bloccata permanentemente.
CARD_INVALID_STATUS=Stato della carta non valido.

# ===== LIMITS =====
LIMIT_TYPE_NOT_FOUND=Tipo di limite non trovato.
LIMIT_EXCEEDS_MAX=L'importo supera il valore massimo consentito.
LIMIT_BELOW_MIN=L'importo è inferiore al valore minimo consentito.
BANK_ONLY_LIMIT=Questo limite può essere modificato solo da un dipendente della banca.
LOWER_ONLY_LIMIT=Puoi solo abbassare questo limite. Contatta un dipendente della banca per aumentarlo.

# ===== TRANSACTIONS =====
INVALID_TRANSACTION=Una transazione richiede almeno un conto.
MINIMUM_TRANSFER=L'importo minimo del bonifico è di 1,00 EUR.
INVALID_TRANSFER=Il conto di destinazione o il beneficiario è obbligatorio.
SAME_ACCOUNT_TRANSFER=I conti di origine e destinazione devono essere diversi.
MISSING_SCHEDULED_DATE=La data programmata è obbligatoria per i bonifici regolari.
INVALID_SCHEDULED_DATE=La data programmata deve essere almeno domani.
SCHEDULE_TOO_FAR=La data programmata non può essere superiore a 30 giorni da oggi.
INVALID_DATE_RANGE=La data di fine non può essere precedente alla data di inizio.
SEARCH_RANGE_TOO_WIDE=L'intervallo di ricerca supera il periodo massimo consentito.
TRANSACTION_NOT_FOUND=Transazione non trovata.
INVALID_TRANSACTION_STATE=Solo le transazioni in attesa possono essere annullate.
TRANSACTION_TYPE_NOT_FOUND=Tipo di transazione non trovato.
TRANSACTION_STATUS_NOT_FOUND=Stato della transazione non trovato.
MINIMUM_WITHDRAWAL=L'importo del prelievo è inferiore al minimo consentito.

# ===== FILE UPLOAD =====
EMPTY_FILE=File vuoto.
INVALID_FILE_TYPE=Tipo di file non supportato. Usa JPG, PNG, GIF o WebP.
FILE_TOO_LARGE=File troppo grande. Massimo 5 MB.

# ===== PASSWORD =====
INVALID_CURRENT_PASSWORD=La password corrente non è corretta.
SAME_PASSWORD=La nuova password non può essere uguale a quella corrente.
PASSWORD_REQUEST_EXISTS=Esiste già una richiesta di modifica password in attesa.

# ===== LIMIT CHANGE REQUEST =====
LIMIT_FULL_ACCESS=Questo limite può essere modificato direttamente.
LOWER_ONLY_INCREASE_REQUIRED=Per questo limite puoi solo richiedere un aumento.
PENDING_REQUEST_EXISTS=Hai già una richiesta in attesa per questo limite. Attendi che venga elaborata.
REQUEST_NOT_FOUND=Richiesta non trovata.
REQUEST_NOT_PENDING=La richiesta non è in stato PENDING.

# ===== GENERIC =====
GENERIC_ERROR=Si è verificato un errore imprevisto.
INTERNAL_ERROR=Si è verificato un errore tecnico imprevisto. Riprova più tardi.
VALIDATION_ERROR=Validazione fallita.

# ===== NOTIFICATIONS =====
NOTIF_ACCOUNT_ACTIVATED=Il tuo conto {0} è stato attivato.
NOTIF_ACCOUNT_REJECTED=La richiesta di apertura conto {0} è stata rifiutata.
NOTIF_CLOSURE_REQUESTED=Richiesta di chiusura conto {0} inviata. In attesa di approvazione.
NOTIF_CLOSURE_REJECTED=La richiesta di chiusura del conto {0} è stata rifiutata.
NOTIF_ACCOUNT_FROZEN=Il tuo conto {0} è stato congelato da un impiegato.
NOTIF_CLOSURE_REJECTED_UNFREEZE=La richiesta di chiusura del conto {0} è stata rifiutata. Il conto è stato riattivato.
NOTIF_ACCOUNT_UNFROZEN=Il tuo conto {0} è stato sbloccato.
NOTIF_ACCOUNT_CLOSED=Il tuo conto {0} è stato chiuso.
NOTIF_ACCOUNT_OPEN_REQUESTED=Richiesta di apertura conto {0} inviata. In attesa di approvazione.
NOTIF_REGISTRATION_APPROVED=Registrazione approvata! Il tuo conto è attivo.
NOTIF_REGISTRATION_REJECTED=La tua registrazione è stata rifiutata.
NOTIF_PWD_CHANGE_REQUESTED=Richiesta di cambio password inviata. In attesa di approvazione.
NOTIF_PWD_CHANGE_APPROVED=La tua richiesta di cambio password è stata approvata.
NOTIF_PWD_CHANGE_REJECTED=La tua richiesta di cambio password è stata rifiutata.
NOTIF_LIMIT_CHANGE_REQUESTED=Richiesta di modifica limite {0} inviata. In attesa di approvazione.
NOTIF_LIMIT_CHANGE_APPROVED=La tua richiesta di modifica limite {0} è stata approvata.
NOTIF_LIMIT_CHANGE_REJECTED=La tua richiesta di modifica limite {0} è stata rifiutata.
NOTIF_CARD_BLOCKED=La carta terminata in {0} è stata bloccata.
NOTIF_CARD_UNBLOCKED=La carta {0} è stata sbloccata.
NOTIF_TRANSFER_RECEIVED=Ricevuto bonifico di €{0} da {1}.
NOTIF_DEPOSIT_COMPLETED=Deposito di €{0} sul conto {1} completato.
NOTIF_WITHDRAWAL_COMPLETED=Prelievo di €{0} dal conto {1} completato.
NOTIF_TRANSFER_COMPLETED=Bonifico di €{0} a {1} completato.
NOTIF_SCHEDULED_TRANSFER_CREATED=Bonifico programmato di €{0} a {1} per il {2}.
NOTIF_SCHEDULED_TRANSFER_EXECUTED=Bonifico programmato di €{0} eseguito verso {1}.
NOTIF_TRANSACTION_CANCELLED=Transazione #{0} annullata.
